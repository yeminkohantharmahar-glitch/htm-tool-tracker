<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HTM Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--dark); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div class="form-card" style="width: 100%; max-width: 350px; margin: 0;">
        <h2 style="text-align: center; color: var(--dark); margin-bottom: 30px;">HTM LOGIN</h2>
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your name">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="login()" class="btn-primary" id="loginBtn">SIGN IN</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
